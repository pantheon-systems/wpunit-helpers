name: Tag and Release
on:
 push:
  branches:
    - main
permissions:
  contents: write
jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pantheon-systems/action-autotag@638975f12971bbf94011847f13ded24d2dc092b8 # v0.1.13
        with:
          gh-token: ${{ github.token }}   